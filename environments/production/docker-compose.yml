# yaml-language-server: $schema=https://json.schemastore.org/compose.json
# /environments/production/docker-compose.yml


services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: flashyard_prod
      POSTGRES_USER: flashyard_user
      POSTGRES_PASSWORD: change_me_later
    volumes:
      - /data/flashyard/postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
    env_file:
       - /data/flashyard/production/.env
    ports:
      - "8000:8000"


  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - /data/flashyard/production/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"