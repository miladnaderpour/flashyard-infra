name: Deploy Production

on:
  repository_dispatch:
    types: [deploy-production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cat > /data/flashyard/production/.env.images <<EOF
            BACKEND_IMAGE=${{ github.event.client_payload.backend_image }}
            FRONTEND_IMAGE=${{ github.event.client_payload.frontend_image }}
            EOF

            export GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'

            bash /data/flashyard/production/scripts/deploy-production.sh