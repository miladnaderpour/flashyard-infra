name: Deploy Staging

on:
  repository_dispatch:
    types: [deploy-staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Prepare image variables
        run: |
          mkdir -p environments/staging
          cat > environments/staging/.env.images <<EOF
          BACKEND_IMAGE=${{ github.event.client_payload.backend_image }}
          FRONTEND_IMAGE=${{ github.event.client_payload.frontend_image }}
          EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /data/flashyard/staging

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker compose pull
            docker compose up -d db

            until docker compose exec -T db pg_isready -U flashyard_user -d flashyard_staging; do
              echo "Waiting for database..."
              sleep 2
            done

            docker compose run --rm backend alembic upgrade head
            docker compose up -d
