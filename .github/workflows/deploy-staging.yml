name: Deploy Staging

on:
  repository_dispatch:
    types: [deploy-staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Write image variables to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Write images passed from app repo
            cat > /data/flashyard/staging/.env.images <<EOF
            BACKEND_IMAGE=${{ github.event.client_payload.backend_image }}
            FRONTEND_IMAGE=${{ github.event.client_payload.frontend_image }}
            EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            export GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'

            bash /data/flashyard/staging/scripts/deploy-staging.sh